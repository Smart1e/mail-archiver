volumes:
  maildir-data:

services:
  mailarchive-app:
    image: ghcr.io/smart1e/mail-archiver:latest
    restart: always
    environment:
      # Database Connection
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=MailArchiver;Username=mailuser;Password=iskhocuyXwaqfTKp;
      # Authentication Settings
      - Authentication__Username=admin
      - Authentication__Password=MD-9kXb!C3-ML8ba
      # TimeZone Settings
      - TimeZone__DisplayTimeZoneId=Europe/London
      # Reverse proxy support
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Development
      # IMAP listener is disabled now — Dovecot owns 143/993. Keeping Enabled=true with
      # Port=0 / ImapsPort=0 still runs the cert-generation path on startup so Dovecot
      # can read shared server.crt / server.key / mailarchiver-ca.cer from ./certs.
      - ImapServer__Enabled=true
      - ImapServer__Port=0
      - ImapServer__ImapsPort=0
      - ImapServer__SmtpEnabled=false
      - ImapServer__CaCertExportPath=/app/certs/mailarchiver-ca.cer
      - ImapServer__ServerCertExportPath=/app/certs/mailarchiver-server.pfx
      # SAN entries baked into the auto-generated TLS cert.
      # Must include every address Apple Mail will connect from — inside the
      # container the auto-detect only sees the docker bridge IP, so the
      # Mac mini's LAN IP and Tailscale IP have to be listed explicitly.
      - ImapServer__SubjectAlternativeNames__0=172.16.10.106
      - ImapServer__SubjectAlternativeNames__1=100.84.150.81
      # Optional: add more entries as __2, __3, etc. — DNS names or IPs both work.
      # - ImapServer__SubjectAlternativeNames__2=mail.example.com
      # Maildir export — projects Postgres archive onto the shared volume for Dovecot.
      - Maildir__Enabled=true
      - Maildir__Root=/var/mail
      # Bump BatchSize for the initial bulk export; can be reduced back to 50 once caught up.
      - Maildir__BatchSize=500
      - Maildir__TickSeconds=10
      - Logging__LogLevel__MailArchiver.Services=Debug
    ports:
      - "5001:5000"
    networks:
      - postgres
      - internal
    volumes:
      - ./data-protection-keys:/app/DataProtection-Keys
      - ./certs:/app/certs
      - maildir-data:/var/mail
    depends_on:
      postgres:
        condition: service_healthy

  dovecot:
    image: dovecot/dovecot:latest
    restart: always
    environment:
      - POSTGRES_PASSWORD=iskhocuyXwaqfTKp
    ports:
      - "143:143"
      - "993:993"
    volumes:
      - ./dovecot-config:/etc/dovecot:ro
      - ./certs:/etc/dovecot/certs:ro
      - maildir-data:/var/mail
    networks:
      - postgres
    depends_on:
      postgres:
        condition: service_healthy
      mailarchive-app:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run --token eyJhIjoiZDY1ZmU2OGZlM2U2Zjc5NjMyZDIyOTU0ZGZmMjc1NTEiLCJ0IjoiMjM0N2E1ZDMtNzM5My00MzFiLWIxMDYtNzlhY2Y4ZDcyOTgwIiwicyI6IlltSmtNelUyTVRNdE5tWXpaUzAwWmpGaUxUa3dZVEV0TURSallUZ3pZemt3WXpFeiJ9
    networks:
      - internal

  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: MailArchiver
      POSTGRES_USER: mailuser
      POSTGRES_PASSWORD: iskhocuyXwaqfTKp
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailuser -d MailArchiver"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  postgres:
  internal:
