# Mail Archiver — Dovecot entry point.
# The archive is read-only: clients authenticate against Postgres (mail_archiver."MailAccounts"),
# home directories resolve to /var/mail/<MailAccount.Id>/Maildir, and the Maildir tree is written
# by the mailarchive-app container (MaildirExportService).

protocols = imap

listen = *

log_path = /dev/stderr
info_log_path = /dev/stderr

# Run inside the container as root; Dovecot drops to `vmail` for mail access via userdb static args.
default_login_user = dovenull
default_internal_user = dovecot

!include conf.d/*.conf
