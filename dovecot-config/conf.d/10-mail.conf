# Maildir layout — one top-level per MailAccount.Id. INBOX sits at the root; other folders
# (Sent, Drafts, etc.) are Maildir++ dot-prefixed subfolders. The C# MaildirExportService
# writes messages into these directories; Dovecot's own indexes (dovecot.index*, dovecot-uidlist)
# live here too and MUST NOT be touched by the exporter — they own UID and UIDVALIDITY.

mail_location = maildir:/var/mail/%u/Maildir:LAYOUT=fs

# Run mail access as a normal numeric uid. Dovecot refuses uid=0 for IMAP workers.
# The exporter writes Maildir data with permissive modes inside the private Docker volume
# so this uid can create dovecot.index*, dovecot-uidlist, and subscription metadata.
mail_uid = 5000
mail_gid = 5000
first_valid_uid = 1
last_valid_uid = 0

# Minimal INBOX namespace. Folders appear exactly as the exporter creates them from the archive's
# FolderName values — no auto-created empty Sent/Drafts/Trash that would confuse users. If the
# archive has "Sent" or "Sent Items" as a source folder, it will appear verbatim under the account.
namespace inbox {
  inbox = yes
}
