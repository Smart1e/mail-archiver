# TLS uses the same cert files that the mailarchive-app container generates. Both containers
# mount ./certs — the app writes server.crt / server.key alongside the PFX used by the old
# (now disabled) C# IMAP listener.

ssl = required
ssl_cert = </etc/dovecot/certs/server.crt
ssl_key = </etc/dovecot/certs/server.key
ssl_min_protocol = TLSv1.2
